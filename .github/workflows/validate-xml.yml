name: Validate XML

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-xml:
    name: Render and validate XML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run XML validation playbook
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        shell: bash
        run: |
          ai_enabled=false
          if [[ -n "${LLM_API_KEY}" && -n "${LLM_API_URL}" ]]; then
            ai_enabled=true
          fi

          ansible-playbook -i inventory/localhost.ini playbook/site.yml \
            -e "ai_enabled=${ai_enabled}" \
            -e "ai_api_url=${LLM_API_URL}" \
            -e "ai_api_key_env_var=LLM_API_KEY" \
            -e "ai_model=${LLM_MODEL:-azure.gpt-4o-mini}"

      - name: Publish validation report summary
        if: always()
        shell: bash
        run: |
          echo "::group::XML Validation Report"
          if [[ -f reports/xml_validation_report.md ]]; then
            {
              echo "## XML Validation Report"
              echo
              cat reports/xml_validation_report.md
            } | tee -a "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## XML Validation Report"
              echo
              echo "No Markdown validation report was generated."
            } | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          echo "::endgroup::"
