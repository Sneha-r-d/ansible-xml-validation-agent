name: Validate XML

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-xml:
    name: Render and validate XML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run XML validation playbook
        run: ansible-playbook -i inventory/localhost.ini playbook/site.yml

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xml-validation-reports
          path: reports/
          if-no-files-found: warn

