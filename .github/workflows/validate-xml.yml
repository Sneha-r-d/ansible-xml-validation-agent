name: Validate XML

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-xml:
    name: Render and validate XML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run XML validation playbook
        run: ansible-playbook -i inventory/localhost.ini playbook/site.yml

      - name: Publish validation report summary
        if: always()
        shell: bash
        run: |
          echo "::group::XML Validation Report"
          if [[ -f reports/xml_validation_report.md ]]; then
            {
              echo "## XML Validation Report"
              echo
              cat reports/xml_validation_report.md
            } | tee -a "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## XML Validation Report"
              echo
              echo "No Markdown validation report was generated."
            } | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          echo "::endgroup::"
